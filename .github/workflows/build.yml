name: Build

env:
  DOCKER_BUILD_SUMMARY: false

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - name: Generate matrix
        id: raw
        uses: docker/bake-action/subaction/matrix@v6
        with:
          target: disk-image
          fields: target,platforms
      - name: Filter to disk-image targets only
        id: matrix
        run: |
          echo "matrix=$(echo '${{ steps.raw.outputs.matrix }}' | jq '[.[] | select(.target | startswith("disk-image-"))]')" >> $GITHUB_OUTPUT

  build:
    needs: prepare
    runs-on: ${{ startsWith(matrix.platforms, 'linux/arm') && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.prepare.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Derive distro and arch
        id: info
        run: |
          distro="${{ matrix.target }}"
          distro="${distro#disk-image-}"
          arch="${{ matrix.platforms }}"
          arch="${arch#linux/}"
          echo "distro=$distro" >> $GITHUB_OUTPUT
          echo "arch=$arch" >> $GITHUB_OUTPUT

      - name: Build disk image
        uses: docker/bake-action@v6
        with:
          targets: ${{ matrix.target }}
          allow: security.insecure
          set: |
            *.platform=${{ matrix.platforms }}

      - uses: actions/upload-artifact@v4
        with:
          name: disk-images-${{ steps.info.outputs.distro }}-${{ steps.info.outputs.arch }}
          path: output/${{ steps.info.outputs.distro }}/
          compression-level: 3
